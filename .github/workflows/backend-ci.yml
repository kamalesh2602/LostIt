name: Backend CI

on:
  push:
    paths:
      - "lostit-server/**"
  pull_request:
    paths:
      - "lostit-server/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: lostit-server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Check server starts
        run: node --check server.js
